<div class="min-h-screen bg-gray-100 p-8">
  <h1 class="text-4xl font-bold text-center mb-8">Users List</h1>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    @for(item of users; track item.id){
      <div [routerLink]="['/home/user/', item.id]" class="bg-white rounded-xl shadow-lg p-6 hover:shadow-2xl transition duration-300 cursor-pointer">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl font-bold text-blue-600">
            {{ item.name }}
          </h2>
          <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm">
            #{{ item.id }}
          </span>
        </div>

        <div class="space-y-2 text-gray-700">
          <p>
            <span class="font-semibold">📧 Email:</span>
            {{ item.email }}
          </p>

          <p>
            <span class="font-semibold">📞 Phone:</span>
            {{ item.phone }}
          </p>

          <p>
            <span class="font-semibold">🏙️ City:</span>
            {{ item.city }}
          </p>
        </div>
      </div>
    }
  </div>
</div>

<button (click)="updateText()">Update child data</button>
<app-about [parentData]="textVal()"></app-about>
